# MCP Server Configuration for Virtura Content System

# Server settings
server:
  port: 8000
  host: "127.0.0.1"
  timeout: 30000

# Content settings
content:
  base_dir: "./archive/VIRTURA-Content"
  schemas_dir: "schemas"
  content_dir: "content"
  generated_dir: "generated"
  manifests_dir: "manifests"

# Security settings
security:
  # Default permissions: public (non-sensitive content only)
  default_permission: "public"
  # Sensitive fields that require explicit authorization
  sensitive_fields:
    - "email"
    - "phone"
    - "address"
    - "private_notes"
    - "internal_comments"
  # API key authentication (required for sensitive content)
  api_keys: []

# Logging settings
logging:
  level: "info"
  file: "./logs/mcp_server.log"
  max_size: 10485760 # 10MB
  max_files: 5
  format: "json"

# Export settings
export:
  default_format: "json"
  supported_formats: ["json", "csv", "markdown"]
  max_export_size: 1000

# Audit settings
audit:
  enabled: true
  log_file: "./logs/audit.log"
  log_requests: true
  log_responses: false

# CORS settings
cors:
  enabled: true
  origin: "*"
  methods: ["GET", "POST", "PUT", "DELETE"]
  allowed_headers: ["Content-Type", "Authorization"]
